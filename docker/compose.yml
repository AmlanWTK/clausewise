# Local development infrastructure.
# Usage (from repo root):  docker compose -f docker/compose.yml up -d
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clausewise-db
    environment:
      POSTGRES_USER: clausewise
      POSTGRES_PASSWORD: clausewise # local dev only; prod uses managed Postgres + secrets
      POSTGRES_DB: clausewise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clausewise -d clausewise"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
